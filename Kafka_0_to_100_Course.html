<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kafka 0 → 100 — Learn It Properly</title>
<style>
:root{
  --ink:#0C1413;--panel:#101B1A;--panel-2:#16201F;--raise:#1B2A28;--line-s:#26433f;--hair:#22302e;
  --text:#DBE7E3;--muted:#82968F;--faint:#5d6f6a;
  --solid:#41D196;--shaky:#F4C04E;--review:#EC6452;--accent:#34C9C2;--accent-ink:#08201f;
  --b1:#34C9C2;--b2:#7C8CF8;--b3:#F2A65A;--b4:#E26EC5;--b5:#9BD64A;--b6:#F4C04E;--b7:#5FD0E0;--b8:#EC6452;
  --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:10px;--r-s:6px;--sh:0 1px 0 rgba(255,255,255,.02),0 8px 24px -12px rgba(0,0,0,.6);
}
html[data-theme="light"]{
  --ink:#F2F0E9;--panel:#FBFAF6;--panel-2:#F5F3EC;--raise:#FFFFFF;--line-s:#dfdcd0;--hair:#e6e3d8;
  --text:#1c2624;--muted:#5d6b66;--faint:#8a958f;
  --solid:#1a9f6c;--shaky:#b07d12;--review:#c8442f;--accent:#0c8f88;--accent-ink:#ffffff;
  --sh:0 1px 2px rgba(20,30,28,.06),0 10px 28px -18px rgba(20,30,28,.25);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.62;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
::selection{background:color-mix(in srgb,var(--accent) 35%,transparent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* header */
header{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:11px 20px;
  background:color-mix(in srgb,var(--ink) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--hair)}
.brand{display:flex;align-items:center;gap:11px;min-width:0;flex-shrink:0}
.logo{width:30px;height:30px;flex:none;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:2px}
.logo i{background:var(--accent);border-radius:1.5px;opacity:.32}
.logo i:nth-child(1),.logo i:nth-child(5),.logo i:nth-child(9){opacity:1}
.logo i:nth-child(3),.logo i:nth-child(7){opacity:.62}
.brand b{font-size:14px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.brand b small{display:block;font:500 10.5px/1.3 var(--mono);color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.levelwrap{flex:1;display:flex;align-items:center;gap:12px;max-width:520px;margin:0 auto}
.levelwrap .lv{font:700 12px/1 var(--mono);color:var(--accent);white-space:nowrap}
.track{flex:1;height:9px;background:var(--panel);border:1px solid var(--hair);border-radius:99px;overflow:hidden;position:relative}
.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--solid));width:0;transition:width .5s ease}
.icon-btn{background:var(--panel);border:1px solid var(--hair);color:var(--muted);width:36px;height:36px;
  border-radius:var(--r-s);cursor:pointer;display:grid;place-items:center;flex:none}
.icon-btn:hover{color:var(--text);border-color:var(--line-s)}
.menu-btn{display:none}

main{flex:1;width:100%;max-width:1280px;margin:0 auto;padding:0 20px;display:grid;
  grid-template-columns:280px 1fr;gap:34px;align-items:start}
/* sidebar */
.coursenav{position:sticky;top:70px;max-height:calc(100vh - 90px);overflow:auto;padding:18px 6px 40px 0;font-size:13.5px}
.homebtn{width:100%;text-align:left;background:var(--panel);border:1px solid var(--hair);color:var(--text);
  padding:11px 13px;border-radius:var(--r-s);cursor:pointer;font:600 13px var(--sans);margin-bottom:16px;
  display:flex;align-items:center;gap:9px}
.homebtn:hover{border-color:var(--line-s)}
.stagegrp{margin-bottom:14px}
.stagehd{font:700 10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--accent);
  padding:8px 8px;display:flex;justify-content:space-between;align-items:center}
.stagehd .rng{color:var(--faint)}
.lrow{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:var(--r-s);cursor:pointer;
  color:var(--muted);border-left:2px solid transparent;line-height:1.35}
.lrow:hover{background:var(--panel);color:var(--text)}
.lrow.cur{background:var(--panel);color:var(--text);border-left-color:var(--accent)}
.lrow.locked{opacity:.45;cursor:not-allowed}
.lrow.locked:hover{background:none;color:var(--muted)}
.tick{width:18px;height:18px;flex:none;border-radius:50%;border:1.5px solid var(--hair);display:grid;place-items:center;
  font:700 10px/1 var(--mono);color:var(--faint)}
.lrow.done .tick{background:var(--solid);border-color:var(--solid);color:var(--accent-ink)}
.lrow.cur .tick{border-color:var(--accent);color:var(--accent)}

#content{min-width:0;padding:22px 0 70px}

/* roadmap */
.road-hero{margin-bottom:26px}
.road-hero h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:0 0 8px;line-height:1.12}
.road-hero p{color:var(--muted);margin:0 0 18px;max-width:60ch}
.continue{font:700 14px var(--sans);background:var(--accent);color:var(--accent-ink);border:0;
  padding:13px 22px;border-radius:var(--r-s);cursor:pointer}
.continue:hover{filter:brightness(1.08)}
.stages{display:flex;flex-direction:column;gap:14px}
.stagecard{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:18px 20px}
.stagecard .top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.stagecard .num{font:800 13px/1 var(--mono);color:var(--accent-ink);background:var(--accent);padding:6px 9px;border-radius:var(--r-s)}
.stagecard h3{margin:0;font-size:17px;font-weight:700}
.stagecard .meta{margin-left:auto;font:600 11px/1 var(--mono);color:var(--muted)}
.stagecard .sub{color:var(--muted);font-size:13.5px;margin:2px 0 12px}
.stagebar{height:6px;background:var(--ink);border-radius:99px;overflow:hidden}
.stagebar i{display:block;height:100%;background:var(--solid);width:0;transition:width .5s}

/* lesson */
.lhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.pill{font:600 10px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;padding:5px 9px;border-radius:99px}
.pill.stage{color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}
.pill.lv{color:var(--shaky);background:color-mix(in srgb,var(--shaky) 14%,transparent)}
.pill.done{color:var(--solid);background:color-mix(in srgb,var(--solid) 16%,transparent)}
.lesson h2.lt{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:6px 0 6px;line-height:1.15}
.hook{font-size:16px;color:var(--text);font-style:italic;border-left:3px solid var(--accent);padding:2px 0 2px 16px;margin:10px 0 22px;color:var(--muted)}
.body{max-width:760px}
.body p{margin:13px 0}
.body ul,.body ol{margin:12px 0;padding-left:22px}.body li{margin:5px 0}
.body strong{color:var(--text);font-weight:700}
.body blockquote{margin:18px 0;padding:10px 18px;border-left:3px solid var(--shaky);background:var(--panel);
  border-radius:0 var(--r-s) var(--r-s) 0;color:var(--text)}
.body code{font-family:var(--mono);font-size:.85em;background:var(--panel-2);padding:.12em .4em;border-radius:4px;border:1px solid var(--hair)}
.body pre{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:15px 16px;overflow:auto;margin:16px 0;line-height:1.5}
.body pre code{background:none;border:0;padding:0;font-size:12.5px;white-space:pre}
.body table{border-collapse:collapse;width:100%;margin:18px 0;font-size:13.5px;display:block;overflow:auto}
.body th,.body td{border:1px solid var(--hair);padding:8px 11px;text-align:left;vertical-align:top}
.body th{background:var(--panel);font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;white-space:nowrap}

/* simulator shell */
.sim{background:var(--panel);border:1px solid var(--line-s);border-radius:var(--r);padding:18px;margin:22px 0;max-width:760px}
.sim .simhd{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.sim .simhd .tag{font:700 9.5px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent);padding:4px 7px;border-radius:4px}
.sim .simhd h4{margin:0;font-size:14px}
.sim .simsub{color:var(--muted);font-size:12.5px;margin:2px 0 14px}
.ctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.ctrls button{font:600 12px var(--sans);padding:9px 13px;border-radius:var(--r-s);border:1px solid var(--hair);
  background:var(--raise);color:var(--text);cursor:pointer}
.ctrls button:hover{border-color:var(--line-s)}
.ctrls button.danger{color:var(--review);border-color:color-mix(in srgb,var(--review) 40%,var(--hair))}
.ctrls button.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.ctrls button:disabled{opacity:.4;cursor:not-allowed}
.ctrls label{font:600 11px/1 var(--mono);color:var(--muted);display:flex;align-items:center;gap:6px}
.ctrls select,.ctrls input[type=range]{accent-color:var(--accent)}
.ctrls select{background:var(--raise);color:var(--text);border:1px solid var(--hair);border-radius:5px;padding:6px 8px;font:600 12px var(--mono)}
.simstage{min-height:60px}
.log-strip{display:flex;gap:5px;flex-wrap:wrap;align-items:flex-end;margin:6px 0 4px}
.cell{min-width:54px;border:1px solid var(--line-s);border-radius:6px;padding:7px 8px;background:var(--ink);position:relative}
.cell .off{font:700 9px/1 var(--mono);color:var(--faint)}
.cell .kv{font:600 12px/1.2 var(--mono);margin-top:3px;white-space:nowrap}
.cell .kv .k{color:var(--accent)}
.gptrs{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.gptr{font:600 12px var(--mono)}
.gptr b{color:var(--accent)}
.simout{font:600 12px/1.6 var(--mono);color:var(--muted);background:var(--ink);border:1px solid var(--hair);
  border-radius:var(--r-s);padding:10px 12px;margin-top:12px;min-height:38px;max-height:120px;overflow:auto;white-space:pre-wrap}
.note{font-size:12.5px;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line-s);padding-top:10px}
.note b{color:var(--text)}
.parts{display:flex;gap:7px;flex-wrap:wrap}
.pbox{flex:1;min-width:70px;border:1px solid var(--hair);border-radius:6px;padding:9px;text-align:center;background:var(--ink);transition:.2s}
.pbox .pl{font:700 10px/1 var(--mono);color:var(--faint)}
.pbox .po{font:700 13px/1 var(--mono);margin-top:5px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.cchip{font:700 11px/1 var(--mono);padding:8px 11px;border-radius:99px;color:#0c1413;display:flex;align-items:center;gap:6px}
.cchip.idle{background:var(--hair)!important;color:var(--faint);text-decoration:line-through}
.brokers{display:flex;gap:10px;flex-wrap:wrap}
.broker{flex:1;min-width:120px;border:1px solid var(--line-s);border-radius:var(--r-s);padding:12px;background:var(--ink);text-align:center;transition:.25s}
.broker.dead{opacity:.35;border-style:dashed}
.broker .bn{font:700 12px/1 var(--mono)}
.broker .role{font:600 9px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-top:5px}
.broker.leader .role{color:var(--accent)}.broker.follower .role{color:var(--muted)}
.broker .cnt{font:800 20px/1 var(--mono);margin-top:8px}
.broker .isr{font:600 9px/1 var(--mono);margin-top:5px}
.broker.insync .isr{color:var(--solid)}.broker.outsync .isr{color:var(--review)}

/* checks */
.checks{max-width:760px;margin-top:8px}
.checks .chd{font:700 11px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:26px 0 10px;display:flex;align-items:center;gap:9px}
.check{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:18px;margin-bottom:12px}
.check.passed{border-color:var(--solid)}
.check .q{font-size:15px;font-weight:600;margin-bottom:12px}
.opt{display:block;width:100%;text-align:left;background:var(--ink);border:1px solid var(--hair);color:var(--text);
  padding:11px 13px;border-radius:var(--r-s);margin:7px 0;cursor:pointer;font:500 13.5px var(--sans);display:flex;gap:10px;align-items:center}
.opt .m{font:700 10px/1 var(--mono);width:20px;height:20px;flex:none;border-radius:5px;border:1px solid var(--hair);display:grid;place-items:center;color:var(--muted)}
.opt:hover:not(:disabled){border-color:var(--line-s)}
.opt.correct{border-color:var(--solid);background:color-mix(in srgb,var(--solid) 12%,transparent)}
.opt.correct .m{background:var(--solid);color:var(--accent-ink);border-color:var(--solid)}
.opt.wrong{border-color:var(--review);background:color-mix(in srgb,var(--review) 12%,transparent)}
.opt.wrong .m{background:var(--review);color:#fff;border-color:var(--review)}
.why{margin-top:11px;font-size:13px;color:var(--muted);background:var(--ink);border:1px solid var(--hair);
  border-left:3px solid var(--accent);border-radius:var(--r-s);padding:11px 13px;display:none}
.why.show{display:block}.why b{color:var(--text)}

.lfoot{display:flex;align-items:center;gap:12px;margin-top:30px;max-width:760px;flex-wrap:wrap}
.navbtn{font:600 13px var(--sans);padding:11px 16px;border-radius:var(--r-s);border:1px solid var(--hair);
  background:var(--panel);color:var(--text);cursor:pointer}
.navbtn:hover{border-color:var(--line-s)}.navbtn:disabled{opacity:.4;cursor:not-allowed}
.navbtn.go{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);margin-left:auto}
.navbtn.go:disabled{background:var(--panel);color:var(--muted);border-color:var(--hair)}
.lockmsg{font-size:13px;color:var(--shaky);background:color-mix(in srgb,var(--shaky) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--shaky) 35%,transparent);border-radius:var(--r-s);padding:12px 14px;max-width:760px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--raise);
  color:var(--text);border:1px solid var(--line-s);padding:11px 18px;border-radius:99px;font:600 13px var(--sans);
  box-shadow:var(--sh);opacity:0;pointer-events:none;transition:.25s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{border-top:1px solid var(--hair);padding:16px 20px;text-align:center;font:500 11.5px/1.6 var(--mono);color:var(--faint)}

@media(max-width:900px){
  .brand b small{display:none}
  main{grid-template-columns:1fr;gap:0}
  .coursenav{position:fixed;inset:53px 0 auto 0;z-index:30;max-height:74vh;background:var(--ink);
    border-bottom:1px solid var(--hair);padding:16px 20px;display:none}
  .coursenav.open{display:block}
  .menu-btn{display:grid}
  .levelwrap{max-width:none}
}
@media print{header,.coursenav,.ctrls,.lfoot,.menu-btn,footer{display:none!important}.why{display:block!important}}
</style>
</head>
<body>
<header>
  <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 4h12M2 8h12M2 12h12"/></svg></button>
  <div class="brand">
    <div class="logo" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <b>Kafka 0 → 100<small>Learn it properly</small></b>
  </div>
  <div class="levelwrap"><span class="lv" id="lvLabel">Level 0</span><div class="track"><div class="fill" id="lvFill"></div></div></div>
  <button class="icon-btn" id="themeBtn" aria-label="Theme"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="5.2"/><path d="M8 2.8a5.2 5.2 0 0 0 0 10.4z" fill="currentColor" stroke="none"/></svg></button>
</header>
<main>
